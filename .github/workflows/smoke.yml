name: Smoke (live Flash API)

# Verifies the GraphQL documents still match the real Flash API using only
# unauthenticated queries. Hits an external service, so it does NOT gate pull
# requests — it runs post-merge on main/v020, daily, and on demand.
on:
  push:
    branches: [main, v020]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Smoke test against api.flashapp.me
        run: npm run smoke
